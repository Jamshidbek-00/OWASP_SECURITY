<!DOCTYPE html>
<html>
<head>
    <title>Eslatmalar - Monoxrom</title>
    <style>
        body { background: #fff; color: #000; font-family: monospace; padding: 20px; }
        .note { border: 1px solid #000; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Mening eslatmalarim</h1>
    {% for note in notes %}
        <div class="note">
            <h3>{{ note.title }}</h3>
            <!-- DIQQAT: 'safe' filtri XSS zaifligini keltirib chiqaradi -->
            <p>{{ note.content | safe }}</p> 
        </div>
    {% endfor %}
    <hr>
    <a href="/login/">Chiqish</a>
</body>
</html>
