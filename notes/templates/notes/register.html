<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWASP Security | Ro'yxatdan o'tish</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #5932ea;
            --bg-color: #f9fbff;
        }
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #f9fbff 0%, #eef2ff 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .login-card {
            background: white;
            padding: 45px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(89, 50, 234, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo { 
            font-size: 26px; 
            font-weight: bold; 
            margin-bottom: 30px; 
            color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        .logo i { color: var(--primary); margin-right: 12px; }
        
        .welcome-text { margin-bottom: 30px; }
        .welcome-text h2 { margin: 0; font-size: 22px; color: #333; }
        .welcome-text p { margin: 5px 0 0; color: #9197b3; font-size: 14px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #555; font-weight: 500; }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #9197b3;
            font-size: 14px;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            background: #fcfdff;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }
        .input-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(89, 50, 234, 0.05); }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover { background: #4a28c7; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(89, 50, 234, 0.2); }

        .footer-text { margin-top: 25px; font-size: 13px; color: #9197b3; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-shield-halved"></i> OWASP Security
        </div>
        
        <div class="welcome-text">
            <h2>Ro'yxatdan o'tish</h2>
            <p>Yangi hisob yaratish uchun ma'lumotlarni kiriting</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Foydalanuvchi nomi</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Parol</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="login-btn">Kirish</button>
        </form>

        <div class="footer-text">
            Hisobingiz yo'qmi? <a href="#">Ro'yxatdan o'tish</a>
        </div>
    </div>
</body>
</html>
